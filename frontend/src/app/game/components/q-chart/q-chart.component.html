<div class="q-chart-wrapper">
  <div class="q-chart-title">Q-Values <span class="dim">(agent preference)</span></div>
  <div class="chart-area" *ngIf="qValues; else noAgent">
    <canvas #chartCanvas></canvas>
  </div>
  <ng-template #noAgent>
    <div class="no-agent-msg">Load a trained agent to see Q-values</div>
  </ng-template>
</div>
