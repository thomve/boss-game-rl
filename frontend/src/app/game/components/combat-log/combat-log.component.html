<div class="log-wrapper">
  <div class="log-header">
    <span class="log-title">Combat Log</span>
  </div>
  <div class="log-container" #logContainer>
    @if (parsedLogs.length === 0) {
      <div class="log-empty">
        Awaiting combat...
      </div>
    }
    @for (entry of parsedLogs; track entry) {
      <div class="log-line" [ngClass]="entry.cssClass">
        {{ entry.text }}
      </div>
    }
  </div>
</div>
